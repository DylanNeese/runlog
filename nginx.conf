# ============================================================
# nginx config snippet — Raspberry Pi
# Place this inside your server {} block in:
#   /etc/nginx/sites-available/default
# ============================================================
#
# This serves two things:
#   1. The built React app (dist/ folder) at /
#   2. The JSON API at /api/runs.json
#
# After editing, run: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;                   # accepts any hostname/IP

    # ── Serve the built React app ───────────────────────────
    root /var/www/runlog;            # copy your dist/ contents here
    index index.html;

    # React SPA: all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Serve the JSON API ──────────────────────────────────
    location /api/ {
        alias /var/www/runlog/api/;  # put runs.json in this folder
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin *;  # allow cross-origin fetch during dev
    }
}

# ============================================================
# DEPLOYMENT STEPS
# ============================================================
#
# 1. Build the React app on your dev machine:
#       npm install
#       npm run build
#    This creates a dist/ folder.
#
# 2. On the Pi, create the web root:
#       sudo mkdir -p /var/www/runlog/api
#
# 3. Copy files to the Pi (from your dev machine):
#       scp -r dist/* pi@<pi-ip>:/var/www/runlog/
#       scp public/api/runs.json pi@<pi-ip>:/var/www/runlog/api/
#
# 4. Apply nginx config and reload:
#       sudo nginx -t
#       sudo systemctl reload nginx
#
# 5. Verify in browser:
#       http://<pi-ip>/api/runs.json   → should return JSON array
#       http://<pi-ip>/                → should load the RunLog app
# ============================================================
